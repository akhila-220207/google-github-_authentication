<!DOCTYPE html>
<html>
<head>
    <title>Customer Support - Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4e73df;
        }

        a {
            text-decoration: none;
            background: #ea4335;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="logo">AKHILA28</div>
    <h2>Customer Support Portal</h2>
    <p>Login using Google</p>
    <a href="/auth/google">Login with Google</a>
</div>

</body>
</html>
