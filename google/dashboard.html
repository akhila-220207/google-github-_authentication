<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f8f9fc;
            text-align: center;
            padding-top: 100px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #4e73df;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            display: inline-block;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        a {
            text-decoration: none;
            background: crimson;
            padding: 8px 15px;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="logo">AKHI3456</div>

<div class="card">
    <h2>Welcome 🎉</h2>
    <p>You are successfully logged in using Google OAuth.</p>
    <a href="/logout">Logout</a>
</div>

</body>
</html>
