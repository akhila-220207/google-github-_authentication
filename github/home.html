<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Support - GitHub Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* Watermark */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 90px;
            color: rgba(255, 255, 255, 0.07);
            white-space: nowrap;
            z-index: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .logo span {
            color: #ffd700;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: black;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #333;
        }
    </style>
</head>

<body>

    <!-- Watermark -->
    <div class="watermark">Akhila1234</div>

    <div class="container">

        <!-- Logo (Half Name + Half ID Example) -->
        <div class="logo">
            AKHI<span>1234</span>
        </div>

        <h2>Student Support Portal</h2>
        <p>Login using GitHub to continue</p>

        <a href="/auth/github" class="btn">
            Login with GitHub
        </a>

    </div>

</body>
</html>
